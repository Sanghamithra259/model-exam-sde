<!DOCTYPE html>
<html>

<head>
<title>Gradesheet</title>
</head>

<body>

<h2>Student Grade Sheet</h2>

<a href="/enter">Back</a> |
<a href="/logout">Sign Out</a>

<br><br>

<p>Name: {{ record.name }}</p>
<p>Subject: {{ record.subject }}</p>
<p>Marks: {{ record.marks }}</p>
<p>Credits: {{ record.credits }}</p>
<p>Grade: {{ record.grade }}</p>
<p>GPA: {{ record.gpa }}</p>

{% if run_id %}
<p>MLflow Run ID: {{ run_id }}</p>
{% endif %}

</body>

</html>
